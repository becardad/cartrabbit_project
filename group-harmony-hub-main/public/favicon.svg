<svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Glowing background -->
  <circle cx="160" cy="160" r="130" fill="transparent" stroke="#F97316" stroke-width="15" opacity="0.3" filter="url(#glow)" />
  
  <!-- Outer Nest Base Twigs -->
  <g stroke="#3E2712" stroke-width="6" stroke-linecap="round" opacity="0.8">
    <path d="M60 180 L140 220 M260 180 L180 220 M160 250 L160 190" />
    <path d="M80 220 L160 240 M240 220 L160 240 M110 260 L210 260" />
    <path d="M40 140 L90 200 M280 140 L230 200 M160 120 L160 90" />
  </g>

  <!-- Inner overlay twigs -->
  <g stroke-linecap="round">
    <path d="M50 140 L120 200" stroke="#4A3018" stroke-width="7" />
    <path d="M270 140 L200 200" stroke="#4A3018" stroke-width="7" />
    <path d="M100 230 L220 230" stroke="#3D2B1A" stroke-width="8" />
    <path d="M35 170 L110 230" stroke="#8B5E3C" stroke-width="6" />
    <path d="M285 170 L210 230" stroke="#8B5E3C" stroke-width="6" />
    <path d="M70 150 L140 130" stroke="#A67B5A" stroke-width="5" />
    <path d="M250 150 L180 130" stroke="#A67B5A" stroke-width="5" />
    <path d="M60 210 L150 250" stroke="#D19C74" stroke-width="4" />
    <path d="M260 210 L170 250" stroke="#D19C74" stroke-width="4" />
    <path d="M160 260 L240 230" stroke="#EDC298" stroke-width="3" />
  </g>
  
  <!-- Inner Bowl -->
  <ellipse cx="160" cy="140" rx="100" ry="35" fill="#2A1B0E" />
  <ellipse cx="160" cy="135" rx="85" ry="25" fill="#150A05" />

  <!-- The Bird nested inside -->
  <g transform="translate(45, 10) scale(1.3)">
    <path d="M65 88 L40 92 L65 100 Z" fill="#FFB020" /> <!-- beak -->
    <ellipse cx="106" cy="74" rx="25" ry="20" fill="#FF7F50" /> <!-- body tail -->
    <circle cx="84" cy="80" r="22" fill="#FF7F50" /> <!-- body -->
    <circle cx="70" cy="90" r="16" fill="#FF7F50" /> <!-- head -->
    <circle cx="65" cy="85" r="4" fill="#FFFFFF" /> <!-- eye white -->
    <circle cx="64" cy="85" r="2" fill="#222" /> <!-- eye dot -->
    <path d="M106 65 Q115 50 125 65 Q115 80 106 65 Z" fill="#FF8C00" /> <!-- tail -->
    <path d="M90 70 Q70 50 50 70 Z" fill="#FF6347" /> <!-- wing -->
  </g>

  <!-- Front Rim Branches -->
  <g stroke-linecap="round">
    <path d="M50 160 L30 110" stroke="#5A4028" stroke-width="5" />
    <path d="M80 150 L60 90"  stroke="#A67B5A" stroke-width="4" />
    <path d="M100 140 L90 80"  stroke="#D19C74" stroke-width="3" />
    <path d="M270 160 L290 110" stroke="#5A4028" stroke-width="5" />
    <path d="M240 150 L260 90"  stroke="#A67B5A" stroke-width="4" />
    <path d="M220 140 L230 80"  stroke="#D19C74" stroke-width="3" />
  </g>
</svg>
