<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
    <title>TextNest</title>
    <meta name="description" content="TextNest - Your conversations, nested safely." />
    <meta name="author" content="TextNest" />
    <meta property="og:title" content="TextNest" />
    <meta property="og:description" content="TextNest - Your conversations, nested safely." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@TextNest" />
    <meta name="twitter:image" content="/favicon.svg" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
  </head>
  <body>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem("theme");
          if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      document.addEventListener('contextmenu', e => e.preventDefault());
      document.addEventListener('keydown', e => {
        if (
          e.key === 'F12' || 
          (e.ctrlKey && e.shiftKey && ['I','i','J','j','C','c'].includes(e.key)) || 
          (e.ctrlKey && ['U','u'].includes(e.key)) ||
          (e.metaKey && e.altKey && ['I','i','J','j','C','c'].includes(e.key)) || 
          (e.metaKey && ['U','u'].includes(e.key))
        ) {
          e.preventDefault();
        }
      });
    </script>
  </body>
</html>
